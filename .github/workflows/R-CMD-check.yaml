on:
  push:
    branches: [main, admin]
  pull_request:
    branches: [main]

name: R-CMD-check

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (R ${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: ubuntu-latest, r: 'release'}
          - {os: macos-latest,  r: 'release'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      # Do not require optional (Suggests) packages to be installed
      _R_CHECK_FORCE_SUGGESTS_: false

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          use-public-rspm: true

      - name: Install macOS system dependencies
        if: runner.os == 'macOS'
        run: |
          brew install gettext
          echo "CPPFLAGS=-I$(brew --prefix gettext)/include" >> $GITHUB_ENV
          echo "LDFLAGS=-L$(brew --prefix gettext)/lib" >> $GITHUB_ENV
          mkdir -p ~/.R
          echo "CPPFLAGS=-I$(brew --prefix gettext)/include" >> ~/.R/Makevars
          echo "LDFLAGS=-L$(brew --prefix gettext)/lib" >> ~/.R/Makevars

      - uses: r-lib/actions/setup-renv@v2

      - uses: r-lib/actions/check-r-package@v2
        with:
          args: 'c("--no-manual", "--no-vignettes")'
          error-on: '"warning"'
          upload-snapshots: true
