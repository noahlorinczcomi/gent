[workspace]
name = "gent-cli"
version = "0.1.0"
description = "Gene-based Association Testing CLI"
channels = ["conda-forge"]
platforms = ["osx-arm64", "osx-64", "linux-64"]

[dependencies]
python = ">=3.9"
r-base = ">=4.3"
r-optparse = ">=1.7"
"r-data.table" = ">=1.14"
r-dplyr = ">=1.1"
r-tidyr = ">=1.3"
r-tibble = ">=3.2"
r-ggplot2 = ">=3.4"
r-ggrepel = ">=0.9"
r-mvnfast = ">=0.2"
r-susier = ">=0.12"

[tasks]
gent      = { cmd = "Rscript src/gent/run.R" }
fetch-ld  = { cmd = "python src/fetch_ld.py" }
